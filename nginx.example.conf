# Example nginx reverse proxy for the link shortener.
#
# The app runs uvicorn on 127.0.0.1:8000 (see docker-compose.yml); nginx
# terminates TLS and proxies to it. Copy to /etc/nginx/sites-available/, adjust
# server_name + cert paths, then symlink into sites-enabled/ and
# `nginx -t && systemctl reload nginx`.

# Rate limiting for link creation (recommended: creation is unauthenticated, so
# this is the main control against bulk-creation / disk-exhaustion abuse).
# limit_req_zone MUST live in the http{} block, not this server file. Add the
# directive to the http{} block in /etc/nginx/nginx.conf, e.g.:
#
#     http {
#         # ... existing directives ...
#         limit_req_zone $binary_remote_addr zone=shorten:10m rate=10r/m;
#     }
#
# The `location = /shorten` block below is active and references that zone, so
# `nginx -t` will fail until the directive above is present.

upstream link_shortener {
    server 127.0.0.1:8000;
    keepalive 16;            # reuse upstream connections
}

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name s.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;                # nginx >= 1.25.1; older: `listen 443 ssl http2;`
    server_name s.example.com;

    # --- TLS (point these at your real certs, e.g. certbot) ---
    ssl_certificate     /etc/letsencrypt/live/s.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;   # let the client pick (recommended for TLS 1.3)
    # ECDHE-only, so no ssl_dhparam file is needed. TLS 1.3 ciphers are fixed.
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # OCSP stapling (optional; needs a resolver):
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 1.1.1.1 9.9.9.9 valid=300s;

    server_tokens off;          # don't advertise the nginx version
    client_max_body_size 16k;   # the form posts a single short field

    # --- Security headers (always = include error responses too) ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;  # add `preload` only once you're committed
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;            # for old browsers; superseded by CSP frame-ancestors
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # Strict CSP works because every script/style is same-origin and external
    # (no inline <script>/<style> in the templates).
    add_header Content-Security-Policy "default-src 'self'; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'" always;

    # --- Compression (use brotli instead if your nginx has the module) ---
    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json;

    # Shared proxy settings, inherited by every location below.
    proxy_http_version 1.1;
    proxy_set_header Connection "";          # enable upstream keepalive
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Static assets: cache at the client. The app already sends ETags, so once
    # the hour is up the browser revalidates cheaply (304) instead of refetching.
    location /static/ {
        proxy_pass http://link_shortener;
        expires 1h;
    }

    # Throttle link creation. Keyed on the real client IP ($binary_remote_addr,
    # via the limit_req_zone that must be added to nginx.conf http{}, see top).
    location = /shorten {
        limit_req zone=shorten burst=5 nodelay;
        proxy_pass http://link_shortener;
    }

    # Management view: GET /admin lists every link and POST /admin/delete
    # revokes one. These routes are unauthenticated at the app layer by design,
    # so they MUST be protected here. `^~` takes precedence over the `location /`
    # prefix below and covers both /admin and /admin/delete.
    location ^~ /admin {
        # HTTP basic auth. Create the password file with:
        #   htpasswd -c /etc/nginx/.htpasswd-shortener <username>
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd-shortener;
        # Or restrict by source IP instead of (or in addition to) basic auth:
        #   allow 203.0.113.0/24;
        #   deny all;
        proxy_pass http://link_shortener;
    }

    location / {
        proxy_pass http://link_shortener;
    }
}
